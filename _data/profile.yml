short_bio: >-
  <p>
    **Doro** is a fan-created derivative character based on <a href="https://en.wikipedia.org/wiki/Dorothy" target="_blank">**Dorothy**</a> from the game *Goddess of Victory: Nikke*. 
    The name "Doro" is derived from the abbreviated English name of Dorothy. 
  </p>
  <p>
    The character is distinguished by its pink hair and dog-like appearance. 
    Originating from Dorothy's in-game design, Doro was created by simplifying her head into a highly stylized form featuring large round eyes and expressive, multifaceted facial expressions, which have become its signature visual characteristics.
  </p>

